version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vetcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vetcare_user
      POSTGRES_PASSWORD: vetcare_password
      POSTGRES_DB: vetcare_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vetcare-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vetcare_user -d vetcare_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vetcare-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - vetcare-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vetcare-network:
    driver: bridge
